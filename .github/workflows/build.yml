name: Wails build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - platform: 'windows/amd64'
            os: 'windows-latest'
          - platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -nsis
          # In Wails v2, the installer is usually named [ProjectName]-amd64-installer.exe
          # We search for it and rename it to a clean name
          $installer = Get-ChildItem -Path build/bin -Filter "*installer.exe" | Select-Object -First 1
          if ($installer) {
            Move-Item -Path $installer.FullName -Destination "build/bin/ArchivumMarkdown-Installer.exe" -Force
          } else {
            Write-Error "Installer not found in build/bin"
          }

      - name: Build MacOS
        if: runner.os == 'macOS'
        run: |
          wails build -platform darwin/universal
          # Wails creates ArchivumMarkdown.app in build/bin
          npm install -g create-dmg
          create-dmg build/bin/ArchivumMarkdown.app build/bin/ || true
          mv build/bin/*.dmg build/bin/ArchivumMarkdown.dmg || true

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          # Use webkit2gtk41 tag for compatibility with modern Ubuntu
          wails build -platform linux/amd64 -tags webkit2gtk41
          cd build/bin
          tar -czvf ArchivumMarkdown-Linux.tar.gz ArchivumMarkdown

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/ArchivumMarkdown-Installer.exe
            build/bin/ArchivumMarkdown.dmg
            build/bin/ArchivumMarkdown-Linux.tar.gz
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
