name: Wails build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - platform: 'windows/amd64'
            os: 'windows-latest'
          - platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          wails build -platform windows/amd64 -nsis
          # The installer is created in build/bin
          # It usually has a name like ArchivumMarkdown-amd64-installer.exe
          cd build/bin
          mv *installer.exe ArchivumMarkdown-Installer.exe || true

      - name: Build MacOS
        if: runner.os == 'macOS'
        run: |
          wails build -platform darwin/universal
          # Wails creates ArchivumMarkdown.app in build/bin
          # We'll use create-dmg to make a nice installer
          npm install -g create-dmg
          create-dmg build/bin/ArchivumMarkdown.app build/bin/ || true
          mv build/bin/*.dmg build/bin/ArchivumMarkdown.dmg || true

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          wails build -platform linux/amd64
          cd build/bin
          tar -czvf ArchivumMarkdown-Linux.tar.gz ArchivumMarkdown

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/ArchivumMarkdown-Installer.exe
            build/bin/ArchivumMarkdown.dmg
            build/bin/ArchivumMarkdown-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
