name: Wails build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - platform: 'windows/amd64'
            os: 'windows-latest'
          - platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    env:
      GO_VERSION: '1.23'
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wails
        uses: host-uk/build@v4.0.0
        with:
          build-name: 'ArchivumMarkdown'
          build-platform: ${{ matrix.build.platform }}
          package: false

      - name: List files (Debug)
        shell: bash
        run: ls -R build/bin

      - name: Package macOS App
        if: matrix.build.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r ArchivumMarkdown.app.zip ArchivumMarkdown.app

      - name: Upload to Draft Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/*.exe
            build/bin/*.app.zip
            build/bin/ArchivumMarkdown
          fail_on_unmatched_files: false
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


